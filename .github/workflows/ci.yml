name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

  backend-check:
    name: Backend Style and Compile
    runs-on: ubuntu-latest
    if: ${{ hashFiles('backend/pom.xml') != '' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Check code style
        run: mvn -B checkstyle:check

      - name: Compile
        run: mvn -B -DskipTests compile

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - backend-check
    if: always()
    steps:
      - name: Report skipped modules
        run: |
          if [ "${{ hashFiles('frontend/package.json') }}" = "" ]; then
            echo "Frontend check skipped: frontend/package.json not found"
          fi
          if [ "${{ hashFiles('backend/pom.xml') }}" = "" ]; then
            echo "Backend check skipped: backend/pom.xml not found"
          fi