server:
  port: 8080

spring:
  application:
    name: campushub-backend
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campushub_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      table-underline: true

campushub:
  jwt:
    secret: Y2FtcHVzaHViLWp3dC1zZWNyZXQtMjAyNS1wcm9kLXNlY3JldC1rZXktbmV2ZXItZXhwb3Nl
    expiration-ms: 86400000
