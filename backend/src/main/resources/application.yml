server:
  port: 8080

spring:
  application:
    name: campushub-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campushub_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

campushub:
  auth:
    # 庞彬负责模块先用 Header 传入当前用户，后续可替换为 JWT 解析结果。
    user-header: X-User-Id
